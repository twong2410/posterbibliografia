<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosaico Multimedia Actualizado</title>
    <style>
        /* --- Reset Básico para ocupar toda la pantalla --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Evita scrolls dobles */
            background-color: #111; /* Fondo oscuro tipo 9GAG/YouTube */
            color: #eee;
        }

        /* --- Contenedor Principal (CSS Grid) --- */
        .grid-container {
            display: grid;
            /* Crea 3 columnas de igual ancho (1 fración cada una) */
            grid-template-columns: repeat(3, 1fr);
            height: 100vh; /* 100% del alto de la ventana vista */
            width: 100%;
        }

        /* --- Estilo común para cada espacio/columna --- */
        .grid-item {
            position: relative;
            border-right: 2px solid #333; /* Línea divisoria oscura */
            display: flex;
            flex-direction: column;
            background-color: #000;
        }

        .grid-item:last-child {
            border-right: none; /* Quita la línea a la última columna */
        }

        /* --- Títulos de las columnas --- */
        .frame-header {
            background-color: #222;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            border-bottom: 1px solid #333;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* Estilos específicos para los encabezados */
        .header-youtube { color: #ff0000; }
        .header-wikipedia { color: #fff; }
        .header-9gag { color: #fff; font-weight: 900;}

        /* --- Estilo de los IFrames --- */
        iframe {
            width: 100%;
            flex-grow: 1; /* Ocupa todo el alto restante de la columna */
            border: none;
            background-color: #fff; /* Fondo blanco por defecto para el contenido */
        }

        /* --- Diseño Adaptable para Móviles (Responsive) --- */
        @media (max-width: 768px) {
            .grid-container {
                /* En pantallas pequeñas, cambia a 1 columna (una sobre otra) */
                grid-template-columns: 1fr;
                grid-template-rows: repeat(3, 1fr); /* 3 filas iguales */
            }
            
            .grid-item {
                border-right: none;
                border-bottom: 2px solid #333;
            }
        }
    </style>
</head>
<body>

    <div class="grid-container">

        <div class="grid-item">
            <div class="frame-header header-youtube">YouTube: Audioslave</div>
            <iframe 
                src="https://www.youtube.com/embed/7QU1nvuxaMA" 
                title="Audioslave - Like a Stone (Official Video)"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>

        <div class="grid-item">
            <div class="frame-header header-wikipedia">Wikipedia</div>
            <iframe 
                src="https://es.wikipedia.org/" 
                title="Wikipedia Español">
            </iframe>
        </div>

        <div class="grid-item">
            <div class="frame-header header-9gag">9GAG</div>
            <iframe 
                src="https://9gag.com/" 
                title="9GAG">
            </iframe>
        </div>

    </div>

</body>
</html>
